<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Covid-19 Dashboard 2026</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
    }

    .dashboard-container {
      width: 100%;
      height: 100vh;
      padding: 10px;
      box-sizing: border-box;
    }

    .dashboard-frame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      background: #fff;
    }

    .title {
      position: absolute;
      top: 14px;
      left: 20px;
      color: white;
      font-size: 18px;
      font-weight: 600;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="title">Covid-19 Dashboard 2026</div>

  <div class="dashboard-container">
    <iframe
      class="dashboard-frame"
      src="https://lookerstudio.google.com/embed/reporting/12b51c33-5b07-45b0-877e-058fbac2a95c/page/dFGqF"
      allowfullscreen
      sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
    </iframe>
  </div>
</body>
</html>
